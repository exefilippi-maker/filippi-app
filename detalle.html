<script>

// 1️⃣ Leer datos de la URL
const params = new URLSearchParams(window.location.search);

const modelo = params.get("modelo");
const anio = params.get("anio");
const km = params.get("km");
const precio = params.get("precio");
const imagen = params.get("imagen");

// 2️⃣ SUMAR VISTA (AHORA SÍ)
fetch(`https://api.countapi.xyz/hit/filippi/${encodeURIComponent(modelo)}`);


// 3️⃣ Separar imágenes
const imagenes = imagen.split(",");

// 4️⃣ Crear carrusel
let galeria = `<div class="carousel">`;

imagenes.forEach(img => {
  galeria += `<img src="${img.trim()}">`;
});

galeria += `</div>`;

// 5️⃣ Mostrar contenido
const contenedor = document.getElementById("detalle");

contenedor.innerHTML = `
  <div class="card">

    ${galeria}

    <h2>${modelo}</h2>
    <p>📅 Año: ${anio}</p>
    <p>🛣️ ${km} km</p>
    <p class="precio">$${precio}</p>

    <p>💳 Financiación disponible</p>
    <p>🔁 Recibimos permutas</p>

    <button onclick="consultar('${modelo}')">
      Consultar por WhatsApp
    </button>

  </div>
`;

// 6️⃣ WhatsApp + tracking de clicks
function consultar(modelo) {
  fetch(`https://api.countapi.xyz/hit/filippi-click/${encodeURIComponent(modelo)}`);

  const mensaje = `Hola, consulto por el ${modelo}`;
  const url = `https://api.whatsapp.com/send?phone=543812082314&text=${encodeURIComponent(mensaje)}`;

  window.location.href = url;
}

</script>
