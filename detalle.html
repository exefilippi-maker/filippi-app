<script>
const params = new URLSearchParams(window.location.search);

// 🔥 obtener datos (con protección)
const modelo = decodeURIComponent(params.get("modelo") || "");
const anio = params.get("anio") || "";
const km = params.get("km") || "";
const precio = params.get("precio") || "";
const imagen = decodeURIComponent(params.get("imagen") || "");
const financiacion = params.get("financiacion") || "";
const permuta = params.get("permuta") || "";

// 🔥 contar vista (AHORA SÍ después de definir modelo)
if (modelo) {
  fetch(`https://api.countapi.xyz/hit/filippi/${modelo}`);
}

// 🔥 separar imágenes (seguro)
const imagenes = imagen ? imagen.split(",") : [];

// 🔥 crear carrusel
let galeria = `<div class="carousel">`;

imagenes.forEach(img => {
  if (img.trim() !== "") {
    galeria += `<img src="${img.trim()}">`;
  }
});

galeria += `</div>`;

// 🔥 lógica negocio (dinámico)
let extras = "";

if (financiacion === "SI") {
  extras += `<p>💳 Financiación disponible</p>`;
}

if (permuta === "SI") {
  extras += `<p>🔁 Recibimos permutas</p>`;
}

// 🔥 render
const contenedor = document.getElementById("detalle");

contenedor.innerHTML = `
  <div class="card">

    ${galeria}

    <h2>${modelo}</h2>
    <p>📅 Año: ${anio}</p>
    <p>🛣️ ${km} km</p>
    <p class="precio">$${precio}</p>

    ${extras}

    <button onclick="consultar('${modelo}')">
      Consultar por WhatsApp
    </button>

  </div>
`;

// 🔥 WhatsApp sin romper navegación
function consultar(modelo) {
  fetch(`https://api.countapi.xyz/hit/filippi-click/${modelo}`);

  const mensaje = `Hola, consulto por el ${modelo}`;
  const url = `https://wa.me/543812082314?text=${encodeURIComponent(mensaje)}`;

  window.open(url, "_blank"); // 👈 abre en nueva pestaña
}
</script>
