<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Detalle del Vehículo</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0a1a2f, #0f2f55);
      color: white;
    }

    .container {
      padding: 20px;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0;
      font-size: 24px;
    }

    .info p {
      margin: 6px 0;
      color: #cfd8e3;
      font-size: 16px;
    }

    .precio {
      font-size: 22px;
      font-weight: bold;
      margin: 15px 0;
      color: #ffffff;
    }

    .badge {
      display: inline-block;
      background: #1e88e5;
      padding: 6px 10px;
      border-radius: 8px;
      margin: 5px 5px 5px 0;
      font-size: 14px;
    }

    .whatsapp {
      display: block;
      text-align: center;
      margin-top: 20px;
      padding: 15px;
      background: #25D366;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      text-decoration: none;
      font-size: 18px;
    }

    .volver {
      display: block;
      margin-top: 15px;
      text-align: center;
      color: #ccc;
      text-decoration: none;
    }

  </style>
</head>

<body>

  <div class="container">

    <img id="imagen">

    <h1 id="modelo"></h1>

    <div class="info">
      <p id="anio"></p>
      <p id="km"></p>
      <p class="precio" id="precio"></p>
    </div>

    <div id="badges"></div>

    <a id="whatsapp" class="whatsapp" target="_blank">
      Consultar por WhatsApp
    </a>

    <a href="index.html" class="volver">⬅ Volver</a>

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const modelo = params.get("modelo");
    const anio = params.get("anio");
    const km = params.get("km");
    const precio = params.get("precio");
    const imagen = params.get("imagen");
    const financiacion = params.get("financiacion");
    const permuta = params.get("permuta");

    // pintar datos
    document.getElementById("modelo").innerText = modelo;
    document.getElementById("anio").innerText = "📅 Año: " + anio;
    document.getElementById("km").innerText = "🛣️ Km: " + km;
    document.getElementById("precio").innerText = precio;
    document.getElementById("imagen").src = imagen;

    // badges dinámicos
    const badges = document.getElementById("badges");

    if (financiacion === "SI") {
      badges.innerHTML += `<span class="badge">💳 Financiación disponible</span>`;
    }

    if (permuta === "SI") {
      badges.innerHTML += `<span class="badge">🔁 Recibe permuta</span>`;
    }

    // link whatsapp automático
    const mensaje = `Hola, te consulto por el ${modelo} ${anio} con ${km} km. ¿Sigue disponible?`;
    const telefono = "5493812082314"; // 🔥 CAMBIAR POR TU NÚMERO

    document.getElementById("whatsapp").href =
      `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
  </script>

</body>
</html>
